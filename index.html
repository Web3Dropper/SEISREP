<!DOCTYPE html>
<html>
<head>
  <title>SEISREP</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.10.0/dist/ethers.umd.min.js"></script>

  <style>
    body {
      margin:0;
      background:#0a0f1c;
      color:white;
      font-family:Arial;
    }

    .container {
      max-width:900px;
      margin:auto;
      padding:20px;
      text-align:center;
    }

    .logo {
      font-size:28px;
      font-weight:bold;
      letter-spacing:2px;
    }

    .subtitle {
      color:#888;
      margin-bottom:20px;
    }

    .grid {
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:10px;
      margin:20px 0;
    }

    .box {
      background:rgba(255,255,255,0.05);
      padding:15px;
      border-radius:10px;
    }

    input {
      width:80%;
      padding:12px;
      border-radius:10px;
      border:none;
      margin:10px;
    }

    button {
      padding:12px 20px;
      border-radius:10px;
      border:none;
      background:#00d4ff;
      font-weight:bold;
      cursor:pointer;
    }

    .card {
      margin-top:20px;
      padding:20px;
      background:rgba(255,255,255,0.05);
      border-radius:12px;
      text-align:left;
    }

    .title {
      font-size:18px;
      margin-bottom:10px;
    }

    .value {
      font-size:14px;
      margin:5px 0;
      color:#ccc;
    }

    .footer {
      margin-top:30px;
      font-size:12px;
      color:#666;
      text-align:center;
    }
  </style>
</head>

<body>

<div class="container">

<div class="logo">SEISREP</div>
<div class="subtitle">Seismic Contribution Intelligence</div>

<div class="grid">
  <div class="box">
    <h3 id="block">-</h3>
    <p>Latest Block</p>
  </div>

  <div class="box">
    <h3 id="gas">-</h3>
    <p>Gas Price</p>
  </div>

  <div class="box">
    <h3>Active</h3>
    <p>Network Status</p>
  </div>
</div>

<input id="address" placeholder="Enter wallet address" />
<br>
<button onclick="analyze()">Analyze Contribution</button>

<div id="output" class="card" style="display:none;">

  <div class="title">Wallet Overview</div>
  <div id="balance" class="value"></div>
  <div id="tx" class="value"></div>

  <div class="title">Contribution Score</div>
  <div id="score" class="value"></div>
  <div id="level" class="value"></div>
  <div id="rank" class="value"></div>

  <div class="title">Insight</div>
  <div id="msg" class="value"></div>

</div>

<div class="footer">
Seismic Testnet Only • Data is indicative and for informational purposes
</div>

</div>

<script>
const provider = new ethers.JsonRpcProvider("https://gcp-2.seismictest.net/rpc");

// NETWORK INFO
async function loadNet() {
  const block = await provider.getBlockNumber();
  const gas = await provider.getFeeData();

  document.getElementById("block").innerText = block;
  document.getElementById("gas").innerText =
    ethers.formatUnits(gas.gasPrice, "gwei") + " gwei";
}
loadNet();
setInterval(loadNet, 5000);

// LEVEL SYSTEM
function getLevel(score) {
  if (score > 85) return ["Core Contributor", "Top Tier Activity"];
  if (score > 70) return ["Active Contributor", "High Engagement"];
  if (score > 50) return ["Participant", "Moderate Activity"];
  return ["New User", "Low Activity"];
}

// ANALYZE
async function analyze() {
  const addr = document.getElementById("address").value.trim();

  if (!ethers.isAddress(addr)) {
    alert("Invalid address");
    return;
  }

  const balance = await provider.getBalance(addr);
  const txCount = await provider.getTransactionCount(addr);

  let score = 30;

  if (balance > ethers.parseEther("1")) score += 20;
  else if (balance > ethers.parseEther("0.1")) score += 10;

  if (txCount > 30) score += 30;
  else if (txCount > 10) score += 20;

  let [levelName, rank] = getLevel(score);

  let msg = "";

  if (score > 75) {
    msg = "This wallet shows consistent interaction and meaningful network participation.";
  } else if (score > 50) {
    msg = "This wallet demonstrates moderate usage with growing engagement.";
  } else {
    msg = "This wallet has limited interaction and is in early stages of participation.";
  }

  document.getElementById("output").style.display = "block";

  document.getElementById("balance").innerText =
    "Balance: " + ethers.formatEther(balance) + " ETH";

  document.getElementById("tx").innerText =
    "Transactions: " + txCount;

  document.getElementById("score").innerText =
    "Score: " + score + " / 100";

  document.getElementById("level").innerText =
    "Level: " + levelName;

  document.getElementById("rank").innerText =
    "Category: " + rank;

  document.getElementById("msg").innerText =
    msg;
}
</script>

</body>
</html>
