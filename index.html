<!DOCTYPE html>
<html>
<head>
  <title>SEISREP PRO</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.10.0/dist/ethers.umd.min.js"></script>

  <style>
    body {
      margin:0;
      background:#0a0f1c;
      color:white;
      font-family:Arial;
      text-align:center;
    }

    .container {
      max-width:900px;
      margin:auto;
      padding:20px;
    }

    .logo {
      font-size:26px;
      font-weight:bold;
      letter-spacing:2px;
    }

    .grid {
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:10px;
      margin:20px 0;
    }

    .box {
      background:rgba(255,255,255,0.05);
      padding:15px;
      border-radius:10px;
    }

    input, button {
      padding:12px;
      margin:10px;
      border-radius:10px;
      border:none;
    }

    button {
      background:#00d4ff;
      font-weight:bold;
      cursor:pointer;
    }

    .card {
      margin-top:20px;
      padding:20px;
      background:rgba(255,255,255,0.05);
      border-radius:12px;
      text-align:left;
    }

    .tx {
      background:#111;
      margin:5px 0;
      padding:10px;
      border-radius:8px;
      font-size:12px;
    }
  </style>
</head>

<body>

<div class="container">

<div class="logo">SEISREP PRO</div>
<p>Seismic Testnet Explorer Dashboard</p>

<div class="grid">
  <div class="box">
    <h3 id="block">-</h3>
    <p>Latest Block</p>
  </div>

  <div class="box">
    <h3 id="gas">-</h3>
    <p>Gas Price</p>
  </div>

  <div class="box">
    <h3 id="status">LIVE</h3>
    <p>Network Status</p>
  </div>
</div>

<input id="address" placeholder="Enter wallet address">
<br>
<button onclick="analyze()">Analyze Wallet</button>

<div id="output" class="card" style="display:none;">
  <h3>Wallet Overview</h3>
  <p id="balance"></p>
  <p id="tx"></p>
  <p id="score"></p>
  <p id="level"></p>

  <h3>Recent Transactions</h3>
  <div id="txList"></div>

</div>

</div>

<script>
const provider = new ethers.JsonRpcProvider("https://gcp-2.seismictest.net/rpc");

// NETWORK INFO
async function loadNet() {
  const block = await provider.getBlockNumber();
  const gas = await provider.getFeeData();

  document.getElementById("block").innerText = block;
  document.getElementById("gas").innerText =
    ethers.formatUnits(gas.gasPrice, "gwei") + " gwei";
}
setInterval(loadNet, 5000);
loadNet();

// ANALYZE
async function analyze() {
  const addr = document.getElementById("address").value.trim();

  if (!ethers.isAddress(addr)) {
    alert("Invalid address");
    return;
  }

  const balance = await provider.getBalance(addr);
  const txCount = await provider.getTransactionCount(addr);

  let score = 30;

  if (balance > ethers.parseEther("1")) score += 20;
  else if (balance > ethers.parseEther("0.1")) score += 10;

  if (txCount > 30) score += 30;
  else if (txCount > 10) score += 20;

  let level =
    score > 75 ? "Trusted" :
    score > 50 ? "Average" :
    "Low Activity";

  document.getElementById("output").style.display = "block";

  document.getElementById("balance").innerText =
    "Balance: " + ethers.formatEther(balance) + " ETH";

  document.getElementById("tx").innerText =
    "Transactions: " + txCount;

  document.getElementById("score").innerText =
    "Score: " + score + "/100";

  document.getElementById("level").innerText =
    "Level: " + level;

  loadTransactions(addr);
}

// LOAD TX (SIMULATED + EXTENDABLE)
async function loadTransactions(addr) {
  const container = document.getElementById("txList");
  container.innerHTML = "";

  // NOTE: RPC can't fetch history → placeholder for now
  for (let i = 0; i < 5; i++) {
    let div = document.createElement("div");
    div.className = "tx";
    div.innerText = "Tx #" + (i+1) + " | Seismic activity detected";
    container.appendChild(div);
  }
}
</script>

</body>
</html>
